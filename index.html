<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="A daily sanctuary for people burned out by AI and digital overload. One small human thing. Every day.">
<meta name="theme-color" content="#0d1f16">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="The Reset">
<title>The Reset — One small human thing. Every day.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1f16;
    --surface: #132a1c;
    --surface2: #1a3524;
    --text: #e8e0d0;
    --text2: #a89f8c;
    --text3: #6b6357;
    --accent: #7eb88a;
    --accent2: #4a8c5c;
    --border: rgba(126,184,138,0.15);
    --serif: 'Lora', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
  }
  .light {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --surface2: #ede8dc;
    --text: #2a2219;
    --text2: #6b5e4a;
    --text3: #a89f8c;
    --accent: #2d7a45;
    --accent2: #1a5c30;
    --border: rgba(45,122,69,0.15);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.4s, color 0.4s;
    -webkit-font-smoothing: antialiased;
  }
  .reset-app {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 1.25rem 5rem;
    min-height: 100vh;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 0 0.5rem;
  }
  .wordmark {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--accent);
    letter-spacing: 0.03em;
  }
  .theme-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 36px; height: 36px;
    cursor: pointer;
    color: var(--text2);
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, color 0.2s;
  }
  .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

  .section { display: none; }
  .section.active { display: block; }

  /* BREATH */
  .breath-wrap {
    text-align: center;
    padding: 2rem 0 1rem;
  }
  .breath-label-top {
    font-family: var(--serif);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }
  .breath-circle-wrap {
    position: relative;
    width: 180px; height: 180px;
    margin: 0 auto 2rem;
  }
  .breath-ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    opacity: 0.3;
  }
  .breath-dot {
    position: absolute; inset: 16px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    transition: transform 1s ease-in-out, background 0.5s;
  }
  .breath-dot.expand { transform: scale(1.18); background: var(--surface); }
  .breath-dot.hold   { transform: scale(1.18); }
  .breath-dot.shrink { transform: scale(0.88); }
  .breath-phase {
    font-family: var(--serif);
    font-size: 18px;
    color: var(--text);
    font-style: italic;
  }
  .breath-count {
    font-size: 28px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 0.25rem;
    font-family: var(--serif);
    line-height: 1;
  }
  .breath-instruction {
    font-size: 13px;
    color: var(--text3);
    margin-bottom: 2rem;
    line-height: 1.6;
  }
  .breath-progress {
    display: flex; gap: 8px; justify-content: center; margin-bottom: 2rem;
  }
  .breath-dot-ind {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--text3);
    transition: background 0.3s, border-color 0.3s;
  }
  .breath-dot-ind.done { background: var(--accent); border-color: var(--accent); }
  .skip-btn {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 13px;
    cursor: pointer;
    font-family: var(--sans);
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .skip-btn:hover { color: var(--text2); }

  /* CARD */
  .card-section { padding-top: 1.5rem; }
  .card-eyebrow {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.5rem;
  }
  .whisper-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem 1.75rem;
    margin-bottom: 1.25rem;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.6s, transform 0.6s;
  }
  .whisper-card.visible { opacity: 1; transform: none; }
  .card-theme {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 1rem;
  }
  .card-action {
    font-family: var(--serif);
    font-size: 22px;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 1.75rem;
  }
  .done-btn {
    width: 100%;
    padding: 0.85rem;
    background: var(--accent2);
    border: none;
    border-radius: 10px;
    color: #e8f5ec;
    font-size: 14px;
    font-family: var(--sans);
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
    letter-spacing: 0.02em;
  }
  .done-btn:hover:not(:disabled) { background: var(--accent); }
  .done-btn:disabled { opacity: 0.5; cursor: default; }
  .done-confirm {
    font-size: 13px;
    color: var(--accent);
    font-style: italic;
    font-family: var(--serif);
    text-align: center;
    margin-top: 0.75rem;
    min-height: 20px;
  }
  .another-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text3);
    font-size: 12px;
    padding: 0.5rem 1rem;
    cursor: pointer;
    font-family: var(--sans);
    margin-top: 0.5rem;
    transition: color 0.2s, border-color 0.2s;
  }
  .another-btn:hover:not(:disabled) { color: var(--text2); border-color: var(--accent); }
  .another-btn:disabled { opacity: 0.4; cursor: default; }

  /* PRACTICE */
  .practice-wrap {
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }
  .practice-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 0.75rem;
  }
  .practice-dots { display: flex; gap: 10px; }
  .practice-day {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: var(--text3);
  }
  .practice-day.done { background: var(--accent2); border-color: var(--accent2); color: #e8f5ec; }
  .practice-day.today { border-color: var(--accent); color: var(--accent); }

  /* NAVIGATOR */
  .nav-section { padding-top: 2rem; }
  .nav-title {
    font-family: var(--serif);
    font-size: 20px;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  .nav-sub {
    font-size: 13px;
    color: var(--text3);
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }
  .accordion-item { border-top: 1px solid var(--border); }
  .accordion-item:last-child { border-bottom: 1px solid var(--border); }
  .accordion-q {
    width: 100%;
    background: none;
    border: none;
    text-align: left;
    padding: 1rem 0;
    color: var(--text2);
    font-size: 14px;
    font-family: var(--sans);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    transition: color 0.2s;
  }
  .accordion-q:hover { color: var(--text); }
  .accordion-q .chevron { font-size: 12px; color: var(--text3); transition: transform 0.25s; flex-shrink: 0; }
  .accordion-q.open .chevron { transform: rotate(180deg); }
  .accordion-a {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text2);
    padding-bottom: 1rem;
    display: none;
    font-family: var(--serif);
    font-style: italic;
  }
  .accordion-a.open { display: block; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 0.5rem 0 max(0.75rem, env(safe-area-inset-bottom));
    z-index: 100;
  }
  .bottom-nav-inner {
    display: flex;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
  }
  .nav-tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--text3);
    font-size: 11px;
    font-family: var(--sans);
    cursor: pointer;
    padding: 0.5rem 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: color 0.2s;
    letter-spacing: 0.04em;
  }
  .nav-tab .icon { font-size: 20px; line-height: 1; }
  .nav-tab.active { color: var(--accent); }
  .nav-tab:hover { color: var(--text2); }

  /* HERO */
  .hero {
    padding: 3rem 0 2rem;
    text-align: center;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }
  .hero h1 {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.35;
    margin-bottom: 0.75rem;
  }
  .hero p {
    font-size: 14px;
    color: var(--text3);
    line-height: 1.7;
  }

  @media (prefers-reduced-motion: reduce) {
    .breath-dot { transition: none; }
    .whisper-card { transition: none; }
  }
</style>
</head>
<body>
<div class="reset-app" id="app">
  <div class="top-bar">
    <span class="wordmark">The Reset</span>
    <button class="theme-btn" id="themeBtn" aria-label="Toggle light/dark mode">☀</button>
  </div>

  <!-- BREATH SECTION -->
  <div class="section active" id="sec-breath">
    <div class="hero">
      <h1>You don't have to optimize anything right now.</h1>
      <p>One small human thing. Every day.</p>
    </div>
    <div class="breath-wrap">
      <div class="breath-label-top">Start here · 60 seconds</div>
      <div class="breath-circle-wrap">
        <div class="breath-ring"></div>
        <div class="breath-dot" id="breathDot">
          <div>
            <div class="breath-count" id="breathNum">4</div>
            <div class="breath-phase" id="breathPhase">inhale</div>
          </div>
        </div>
      </div>
      <div class="breath-instruction" id="breathInstruct">Breathe in slowly through your nose</div>
      <div class="breath-progress" id="breathProgress">
        <div class="breath-dot-ind" id="bi0"></div>
        <div class="breath-dot-ind" id="bi1"></div>
        <div class="breath-dot-ind" id="bi2"></div>
      </div>
      <button class="skip-btn" id="skipBreath">skip to today's reset →</button>
    </div>
  </div>

  <!-- CARD SECTION -->
  <div class="section" id="sec-card">
    <div class="card-section">
      <div class="card-eyebrow">Today's reset</div>
      <div class="whisper-card" id="whisperCard">
        <div class="card-theme" id="cardTheme"></div>
        <div class="card-action" id="cardAction"></div>
        <button class="done-btn" id="doneBtn">I did this today</button>
        <div class="done-confirm" id="doneConfirm"></div>
        <div style="text-align:center; margin-top:0.75rem;">
          <button class="another-btn" id="anotherBtn">give me another</button>
        </div>
      </div>
      <div class="practice-wrap">
        <div class="practice-label">Your practice</div>
        <div class="practice-dots" id="practiceDots"></div>
      </div>
    </div>
  </div>

  <!-- NAVIGATE SECTION -->
  <div class="section" id="sec-nav">
    <div class="nav-section">
      <div class="nav-title">Navigating AI</div>
      <div class="nav-sub">Honest, calm answers. No hype. No fear.</div>
      <div id="accordion"></div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" aria-label="Main navigation">
  <div class="bottom-nav-inner">
    <button class="nav-tab active" data-tab="breath" id="tab-breath">
      <span class="icon" aria-hidden="true">○</span>breathe
    </button>
    <button class="nav-tab" data-tab="card" id="tab-card">
      <span class="icon" aria-hidden="true">◇</span>today
    </button>
    <button class="nav-tab" data-tab="nav" id="tab-nav">
      <span class="icon" aria-hidden="true">≡</span>navigate
    </button>
  </div>
</nav>

<script>
  const STORAGE = {
    get: k => { try { return JSON.parse(localStorage.getItem('reset_' + k)); } catch(e) { return null; } },
    set: (k, v) => { try { localStorage.setItem('reset_' + k, JSON.stringify(v)); } catch(e) {} }
  };

  const TODAY = new Date().toISOString().slice(0, 10);

  const CARDS = [
    { theme: 'presence',    action: 'Write one sentence by hand. Just one.' },
    { theme: 'stillness',   action: 'Sit outside for five minutes. No phone.' },
    { theme: 'connection',  action: 'Call someone instead of texting.' },
    { theme: 'nourishment', action: 'Eat your next meal without a screen.' },
    { theme: 'noticing',    action: 'Name three things you saw with your eyes today.' },
    { theme: 'making',      action: 'Make something with your hands. Anything.' },
    { theme: 'reading',     action: 'Read one page of a physical book.' },
    { theme: 'walking',     action: 'Take a ten-minute walk without headphones.' },
    { theme: 'rest',        action: 'Do nothing for three minutes. Completely nothing.' },
    { theme: 'gratitude',   action: 'Tell someone one specific thing you appreciate about them.' },
    { theme: 'cooking',     action: 'Cook something simple from scratch tonight.' },
    { theme: 'listening',   action: 'Put on music and just listen — no other tasks.' },
    { theme: 'tidying',     action: 'Clear one small surface. Make it beautiful.' },
    { theme: 'morning',     action: 'Wait one hour before looking at your phone tomorrow morning.' },
    { theme: 'breathing',   action: 'Step outside and take five slow breaths of real air.' },
    { theme: 'slowness',    action: 'Do one thing today at half your normal speed.' },
  ];

  const FAQS = [
    { q: 'Will AI take my job?',
      a: 'Some roles will change. Most won\'t vanish — they\'ll shift. The people who do well are those who understand what AI can\'t do: judgment, empathy, creativity, relationships. You have all of those.' },
    { q: 'Do I need to learn AI tools?',
      a: 'You don\'t need to master everything. But knowing what\'s out there — and what it\'s good for — is useful. Start with one tool that solves a real problem you have. That\'s enough.' },
    { q: 'Is it okay to not use AI?',
      a: 'Yes. Completely. No one is obligated to adopt every new technology. If it doesn\'t serve your life or work right now, you don\'t have to use it.' },
    { q: 'How do I set boundaries with AI at work?',
      a: 'Be honest about what you\'re comfortable with. Ask your manager what the expectations actually are — most haven\'t thought it through yet. You\'re allowed to say "I prefer to do this myself."' },
    { q: 'What should I actually use AI for?',
      a: 'The tedious, the repetitive, the first draft. Let it do the grunt work so you can do the thinking. Never let it replace your voice, your judgment, or your relationships.' },
    { q: 'Is AI making us less human?',
      a: 'Only if we let it. The tools don\'t decide how we live — we do. You\'re here, which means you\'re already paying attention.' },
    { q: 'I feel left behind. Everyone seems to be using AI constantly.',
      a: 'That feeling is real and very common. But "everyone" is an illusion — most people are just as uncertain as you are. You are not behind. You\'re being thoughtful.' },
  ];

  function getCardIndex() {
    const skips = STORAGE.get('skips') || { date: '', count: 0, index: 0 };
    const seed = TODAY.replace(/-/g, '');
    const base = parseInt(seed.slice(-6)) % CARDS.length;
    const offset = (skips.date === TODAY) ? skips.index : 0;
    return (base + offset) % CARDS.length;
  }

  function buildPractice() {
    const streak = STORAGE.get('streak') || {};
    const dots = document.getElementById('practiceDots');
    dots.innerHTML = '';
    const days = ['S','M','T','W','T','F','S'];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      const el = document.createElement('div');
      el.className = 'practice-day'
        + (streak[key] ? ' done' : '')
        + (i === 0 ? ' today' : '');
      el.textContent = days[d.getDay()];
      dots.appendChild(el);
    }
  }

  function showCard() {
    const idx = getCardIndex();
    const card = CARDS[idx];
    document.getElementById('cardTheme').textContent = card.theme;
    document.getElementById('cardAction').textContent = card.action;
    const streak = STORAGE.get('streak') || {};
    const doneBtn = document.getElementById('doneBtn');
    const doneConfirm = document.getElementById('doneConfirm');
    const anotherBtn = document.getElementById('anotherBtn');
    const skips = STORAGE.get('skips') || { date: '', count: 0, index: 0 };
    if (streak[TODAY]) {
      doneBtn.disabled = true;
      doneBtn.textContent = 'Done for today ✓';
      doneConfirm.textContent = 'Good. That counts.';
    } else {
      doneBtn.disabled = false;
      doneBtn.textContent = 'I did this today';
      doneConfirm.textContent = '';
    }
    const skipCount = skips.date === TODAY ? skips.count : 0;
    if (skipCount >= 3) {
      anotherBtn.disabled = true;
      anotherBtn.textContent = 'that\'s your three for today';
    } else {
      anotherBtn.disabled = false;
      anotherBtn.textContent = 'give me another';
    }
    const wc = document.getElementById('whisperCard');
    wc.classList.remove('visible');
    setTimeout(() => wc.classList.add('visible'), 80);
    buildPractice();
  }

  function buildAccordion() {
    const acc = document.getElementById('accordion');
    FAQS.forEach(item => {
      const wrap = document.createElement('div');
      wrap.className = 'accordion-item';
      const btn = document.createElement('button');
      btn.className = 'accordion-q';
      btn.innerHTML = item.q + '<span class="chevron" aria-hidden="true">▾</span>';
      const ans = document.createElement('div');
      ans.className = 'accordion-a';
      ans.textContent = item.a;
      btn.addEventListener('click', () => {
        const isOpen = ans.classList.contains('open');
        document.querySelectorAll('.accordion-a').forEach(a => a.classList.remove('open'));
        document.querySelectorAll('.accordion-q').forEach(q => q.classList.remove('open'));
        if (!isOpen) { ans.classList.add('open'); btn.classList.add('open'); }
      });
      wrap.appendChild(btn);
      wrap.appendChild(ans);
      acc.appendChild(wrap);
    });
  }

  // BREATH ENGINE
  let breathCycle = 0;
  let breathCountdown = null;

  const phases = [
    { label: 'inhale', instruct: 'Breathe in slowly through your nose', dur: 4, cls: 'expand' },
    { label: 'hold',   instruct: 'Hold gently',                          dur: 4, cls: 'hold' },
    { label: 'exhale', instruct: 'Let it all go',                        dur: 4, cls: 'shrink' },
  ];

  function runPhase(phaseIdx) {
    const p = phases[phaseIdx];
    const dot = document.getElementById('breathDot');
    const numEl = document.getElementById('breathNum');
    const phaseEl = document.getElementById('breathPhase');
    const instEl = document.getElementById('breathInstruct');
    dot.className = 'breath-dot ' + p.cls;
    phaseEl.textContent = p.label;
    instEl.textContent = p.instruct;
    numEl.textContent = p.dur;
    let c = p.dur;
    breathCountdown = setInterval(() => {
      c--;
      numEl.textContent = Math.max(c, 1);
      if (c <= 0) {
        clearInterval(breathCountdown);
        const next = (phaseIdx + 1) % 3;
        if (next === 0) {
          breathCycle++;
          const ind = document.getElementById('bi' + Math.min(breathCycle - 1, 2));
          if (ind) ind.classList.add('done');
          if (breathCycle >= 3) { finishBreath(); return; }
        }
        runPhase(next);
      }
    }, 1000);
  }

  function finishBreath() {
    clearInterval(breathCountdown);
    STORAGE.set('breath_done', TODAY);
    switchTab('card');
    showCard();
  }

  document.getElementById('skipBreath').addEventListener('click', () => {
    clearInterval(breathCountdown);
    switchTab('card');
    showCard();
  });

  document.getElementById('doneBtn').addEventListener('click', () => {
    const streak = STORAGE.get('streak') || {};
    streak[TODAY] = true;
    STORAGE.set('streak', streak);
    const btn = document.getElementById('doneBtn');
    btn.disabled = true;
    btn.textContent = 'Done for today ✓';
    document.getElementById('doneConfirm').textContent = 'Good. That counts.';
    buildPractice();
  });

  document.getElementById('anotherBtn').addEventListener('click', () => {
    const skips = STORAGE.get('skips') || { date: '', count: 0, index: 0 };
    const count = skips.date === TODAY ? skips.count : 0;
    if (count >= 3) return;
    const newIndex = (skips.date === TODAY ? skips.index : 0) + 1;
    STORAGE.set('skips', { date: TODAY, count: count + 1, index: newIndex });
    showCard();
  });

  // THEME
  const savedTheme = STORAGE.get('theme');
  if (savedTheme === 'light') {
    document.getElementById('app').classList.add('light');
    document.getElementById('themeBtn').textContent = '☾';
  }
  document.getElementById('themeBtn').addEventListener('click', () => {
    const app = document.getElementById('app');
    const isLight = app.classList.toggle('light');
    document.getElementById('themeBtn').textContent = isLight ? '☾' : '☀';
    STORAGE.set('theme', isLight ? 'light' : 'dark');
  });

  // TABS
  function switchTab(name) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('sec-' + name).classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  document.querySelectorAll('.nav-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      switchTab(tab);
      if (tab === 'card') showCard();
    });
  });

  buildAccordion();
  runPhase(0);
</script>
</body>
</html>
