<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="A daily sanctuary for people burned out by AI and digital overload. One small human thing. Every day.">
<meta name="theme-color" content="#3d6b3d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Reset">
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
<title>The Reset — One small human thing. Every day.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="reset-app" id="app">
  <div class="top-bar">
    <span class="wordmark">The Reset</span>
    <button class="theme-btn" id="themeBtn" aria-label="Toggle light/dark mode">☀</button>
  </div>

  <!-- BREATH SECTION -->
  <div class="section active" id="sec-breath">
    <div class="hero">
      <h1>You don't have to optimize anything right now.</h1>
      <p>One small human thing. Every day.</p>
    </div>
    <div class="breath-wrap">
      <div class="breath-label-top">Start here · 60 seconds</div>
      <div class="breath-circle-wrap">
        <div class="breath-ring"></div>
        <div class="breath-dot" id="breathDot">
          <div>
            <div class="breath-count" id="breathNum">4</div>
            <div class="breath-phase" id="breathPhase">inhale</div>
          </div>
        </div>
      </div>
      <div class="breath-instruction" id="breathInstruct">When you're ready, press Begin.</div>
      <button class="begin-btn" id="beginBreath">Begin</button>
      <div class="breath-progress" id="breathProgress" style="display:none;">
        <div class="breath-dot-ind" id="bi0"></div>
        <div class="breath-dot-ind" id="bi1"></div>
        <div class="breath-dot-ind" id="bi2"></div>
      </div>
      <button class="skip-btn" id="skipBreath" style="display:none;">skip to today's reset →</button>
    </div>
  </div>

  <!-- CARD SECTION -->
  <div class="section" id="sec-card">
    <div class="card-section">
      <div class="card-eyebrow">Today's reset</div>
      <div class="whisper-card" id="whisperCard">
        <div class="card-theme" id="cardTheme"></div>
        <div class="card-action" id="cardAction"></div>
        <button class="done-btn" id="doneBtn">I did this today</button>
        <div class="done-confirm" id="doneConfirm"></div>
        <div style="text-align:center; margin-top:0.75rem;">
          <button class="another-btn" id="anotherBtn">give me another</button>
        </div>
      </div>
      <div class="practice-wrap">
        <div class="practice-label">Your practice</div>
        <div class="practice-dots" id="practiceDots"></div>
      </div>
    </div>
  </div>

  <!-- NAVIGATE SECTION -->
  <div class="section" id="sec-nav">
    <div class="nav-section">
      <div class="nav-title">Navigating AI</div>
      <div class="nav-sub">Honest, calm answers. No hype. No fear.</div>
      <div id="accordion"></div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" aria-label="Main navigation">
  <div class="bottom-nav-inner">
    <button class="nav-tab active" data-tab="breath" id="tab-breath">
      <span class="icon" aria-hidden="true">○</span>breathe
    </button>
    <button class="nav-tab" data-tab="card" id="tab-card">
      <span class="icon" aria-hidden="true">◇</span>today
    </button>
    <button class="nav-tab" data-tab="nav" id="tab-nav">
      <span class="icon" aria-hidden="true">≡</span>navigate
    </button>
  </div>
</nav>

<script src="script.js"></script>
<!-- Install nudge -->
<div id="install-nudge">
  <span>📱 Save The Reset to your home screen</span>
  <button onclick="triggerInstall()">Add</button>
  <button onclick="dismissInstall()" style="background:none;border:none;color:inherit;cursor:pointer;font-size:1.1rem;padding:4px;">✕</button>
</div>

</body>
</html>
